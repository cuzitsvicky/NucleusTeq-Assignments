<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexRide</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>

<body>
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="admin.html" class="logo-link">
                <img src="img/logo.png" alt="Car Logo" class="navbar-logo">
                <h1>NexRide</h1>
            </a>
        </div>

        <div class="navbar-menu">
            <a href="#" class="nav-link" data-admin-nav="bookings" onclick="showAllBookings(); return false;">Bookings</a>
            <a href="#" class="nav-link" data-admin-nav="vehicles" onclick="showManageVehicles(); return false;">Vehicles</a>
            <a href="#" class="nav-link" data-admin-nav="add-vehicle" onclick="showAddVehicleForm(); return false;">Add Vehicle</a>
            <a href="#" class="nav-link" onclick="logout()">Logout</a>
        </div>

        <div class="navbar-toggle" onclick="toggleMenu()">☰</div>
    </nav>

    <div class="container">
        <div id="pageError" class="error" style="display:none;"></div>

        <section class="form-section" id="addVehicleSection" style="display:none;">
            <h2>Add New Vehicle</h2>
            <form id="addVehicleForm">
                <div class="form-group">
                    <label for="name">Vehicle Name</label>
                    <input type="text" id="name" required>
                </div>

                <div class="form-group">
                    <label for="type">Type</label>
                    <select id="type" name="type" required>
                        <option value="">Select vehicle type</option>
                        <option value="Car">Car</option>
                        <option value="Bike">Bike</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description"></textarea>
                </div>

                <div class="form-group" style="flex-direction:row;align-items:center;gap:12px;">
                    <input type="checkbox" id="availabilityStatus" checked>
                    <label for="availabilityStatus"
                        style="text-transform:none;letter-spacing:0;font-size:0.9rem;color:var(--text-m);">
                        Available for booking
                    </label>
                </div>

                <button type="submit" class="btn">Add Vehicle</button>
                <button type="button" class="btn btn-secondary" onclick="cancelAdd()">Cancel</button>
            </form>
        </section>

        <section class="form-section" id="updateVehicleSection" style="display:none;">
            <h2>Update Vehicle</h2>
            <form id="updateVehicleForm">
                <input type="hidden" id="updateVehicleId">

                <div class="form-group">
                    <label for="updateName">Vehicle Name</label>
                    <input type="text" id="updateName" required>
                </div>

                <div class="form-group">
                    <label for="updateType">Type</label>
                    <select id="updateType" name="type" required>
                        <option value="">Select vehicle type</option>
                        <option value="Car">Car</option>
                        <option value="Bike">Bike</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="updateDescription">Description</label>
                    <textarea id="updateDescription"></textarea>
                </div>

                <div class="form-group" style="flex-direction:row;align-items:center;gap:12px;">
                    <input type="checkbox" id="updateAvailabilityStatus">
                    <label for="updateAvailabilityStatus"
                        style="text-transform:none;letter-spacing:0;font-size:0.9rem;color:var(--text-m);">
                        Available for booking
                    </label>
                </div>

                <button type="submit" class="btn">Update Vehicle</button>
                <button type="button" class="btn btn-secondary" onclick="cancelUpdate()">Cancel</button>
            </form>
        </section>

        <section id="manageVehiclesSection" style="display:none;">
            <h2>All Vehicles</h2>
            <div id="vehicleList" class="vehicle-list"></div>
            <div id="noVehiclesMessage" class="message">No vehicles available.</div>
        </section>

        <section id="vehicleBookingsSection" style="display:none;">
            <h2>Bookings for <span id="vehicleBookingsTitle"></span></h2>
            <button class="btn btn-secondary" onclick="showManageVehicles()">← Back to Vehicles</button>
            <div id="vehicleBookingList" class="booking-list"></div>
            <div id="noVehicleBookingsMessage" class="message">No bookings for this vehicle.</div>
        </section>

        <section id="allBookingsSection" style="display:none;">
            <h2>All Bookings</h2>
            <div id="bookingList" class="booking-list"></div>
            <div id="noBookingsMessage" class="message">No bookings available.</div>
        </section>
    </div>

    <footer class="footer">
        <p>© 2026 NexRide. All rights reserved.</p>
    </footer>

    <script src="js/scripts.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
