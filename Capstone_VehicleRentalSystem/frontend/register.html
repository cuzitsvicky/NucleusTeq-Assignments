<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexRide - Register</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="img/logo.png">
</head>

<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-brand">
            <a href="index.html" class="logo-link">
                <img src="img/logo.png" alt="NexRide Logo" class="navbar-logo">
                <h1>NexRide</h1>
            </a>
        </div>
        <div class="navbar-menu">
            <a href="index.html" class="nav-link">Login</a>
            <a href="register.html" class="nav-link active">Register</a>
        </div>
        <div class="navbar-toggle" onclick="toggleMenu()">☰</div>
    </nav>

    <!-- Registration Overlay -->
    <div class="login-overlay" style="display:flex;">
        <div class="login-card">
            <div class="login-left">
                <img src="img/logo.png" alt="Registration Image">
            </div>
            <div class="login-right">
                <h1>Create Account</h1>
                <div id="error" class="error" style="display:none;"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </div>
                    <div class="form-group">
                        <label for="role">Account Type</label>
                        <select id="role">
                            <option value="USER">User</option>
                            <option value="ADMIN">Admin</option>
                        </select>
                    </div>
                    <button type="submit" class="btn">Create Account</button>
                </form>

                <p>Already have an account? <a href="index.html">Login here</a></p>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 NexRide. All rights reserved.</p>
    </footer>

    <script src="js/scripts.js"></script>
    <script src="js/register.js"></script>
</body>

</html>
